name: Release Tag

on:
  workflow_run:
    workflows: ['History Audit']
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: release-tag-v1.0.0
  cancel-in-progress: false

jobs:
  tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 130
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
      RELEASE_TAG: v1.0.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Verify release declaration and current main
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          declaration = json.loads(Path('release/v1.0.0.json').read_text(encoding='utf-8'))
          if declaration.get('schema_version') != 1:
              raise SystemExit('release declaration schema_version must be 1')
          if declaration.get('tag') != 'v1.0.0':
              raise SystemExit('release declaration tag must be v1.0.0')
          required = declaration.get('required_workflows')
          if not isinstance(required, list) or not required:
              raise SystemExit('release declaration requires a non-empty workflow list')
          PY
          git fetch origin main --tags
          main_sha=$(git rev-parse origin/main)
          if [ "$main_sha" != "$RELEASE_SHA" ]; then
            echo "release SHA $RELEASE_SHA is no longer current main $main_sha" >&2
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            tag_sha=$(git rev-list -n 1 "$RELEASE_TAG")
            git merge-base --is-ancestor "$tag_sha" origin/main
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_TAG already exists at $tag_sha"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Wait for every exact-SHA release gate
        if: steps.preflight.outputs.already_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t required < <(python3 - <<'PY'
          import json
          from pathlib import Path
          for name in json.loads(Path('release/v1.0.0.json').read_text(encoding='utf-8'))['required_workflows']:
              print(name)
          PY
          )
          gate_args=()
          for name in "${required[@]}"; do
            gate_args+=(--required "$name")
          done
          deadline=$((SECONDS + 7200))
          while true; do
            gh api --method GET \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/$GITHUB_REPOSITORY/actions/runs" \
              -f "head_sha=$RELEASE_SHA" \
              -f 'per_page=100' > workflow-runs.json
            set +e
            python3 scripts/evaluate_release_runs.py \
              --runs-json workflow-runs.json \
              --sha "$RELEASE_SHA" \
              --branch main \
              "${gate_args[@]}" > gate-status.txt
            status=$?
            set -e
            cat gate-status.txt
            case "$status" in
              0) break ;;
              2) echo 'one or more release gates failed' >&2; exit 1 ;;
              3)
                if [ "$SECONDS" -ge "$deadline" ]; then
                  echo 'timed out waiting for release gates' >&2
                  exit 1
                fi
                sleep 15
                ;;
              *) echo 'release gate evaluator failed' >&2; exit 1 ;;
            esac
          done
      - name: Reconfirm main and create annotated tag
        if: steps.preflight.outputs.already_tagged != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags
          main_sha=$(git rev-parse origin/main)
          if [ "$main_sha" != "$RELEASE_SHA" ]; then
            echo "main advanced from $RELEASE_SHA to $main_sha while gates were running" >&2
            exit 1
          fi
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "$RELEASE_TAG was created concurrently; leaving it unchanged"
            exit 0
          fi
          git config user.name 'SignalChord Release Automation'
          git config user.email 'release-automation@users.noreply.github.com'
          git tag --annotate "$RELEASE_TAG" "$RELEASE_SHA" \
            --message 'SignalChord v1.0.0: public-source alpha and personal single-server Kubernetes reference'
          git push origin "refs/tags/$RELEASE_TAG"
