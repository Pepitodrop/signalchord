name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typescript-typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typescript-typecheck.log
          if-no-files-found: warn
      - run: pnpm test
      - run: pnpm build

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: services/go.mod
      - run: go mod tidy
      - name: Upload generated Go checksum
        uses: actions/upload-artifact@v4
        with:
          name: go-sum
          path: services/go.sum
          if-no-files-found: error
      - run: test -z "$(gofmt -l .)"
      - name: Go vet
        shell: bash
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee go-vet.log
      - name: Upload Go diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-diagnostics
          path: services/go-vet.log
          if-no-files-found: warn
      - run: go test -race ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/requirements.txt
      - run: pip install -r services/requirements.txt pytest==8.4.0 ruff==0.11.13 mypy==1.16.0
      - run: python -m compileall -q services
      - run: >-
          pytest -q
          services/nlp-pipeline services/entity-resolution services/claim-intelligence
          services/velato-engine services/notification-worker
      - run: ruff check --select E9,F63,F7,F82 services

  rails:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: signalchord_control_plane_test
          POSTGRES_USER: signalchord
          POSTGRES_PASSWORD: signalchord
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U signalchord -d signalchord_control_plane_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    defaults:
      run:
        working-directory: apps/control-plane
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://signalchord:signalchord@localhost:5432/signalchord_control_plane_test
      SECRET_KEY_BASE: ci-secret-key-base
      NOTIFICATION_TOKEN_ENCRYPTION_KEY: ci-notification-encryption-key
      DISABLE_BOOTSNAP: 'true'
      SIGNALCHORD_VERSION: 1.0.0
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
      - run: bundle install --jobs 4 --retry 3
      - run: bundle lock --add-platform x86_64-linux
      - uses: actions/upload-artifact@v4
        with:
          name: gemfile-lock
          path: apps/control-plane/Gemfile.lock
          if-no-files-found: error
      - run: bin/rails db:prepare
      - run: bundle exec rspec
      - run: bin/rails zeitwerk:check

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.55.1'
      - working-directory: packages/event-schemas
        run: buf lint
      - name: Backward compatibility when baseline exists
        shell: bash
        run: |
          if git cat-file -e origin/main:packages/event-schemas/buf.yaml 2>/dev/null; then
            cd packages/event-schemas
            buf breaking --against '../../.git#branch=origin/main,subdir=packages/event-schemas'
          else
            echo 'No event-schema baseline exists on main yet.'
          fi

  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck
      - run: docker compose --profile slice config --quiet
      - name: Validate JSON documents
        run: find . -type f -name '*.json' -not -path './node_modules/*' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - run: gitleaks git --redact --exit-code=1 .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  docker-build:
    runs-on: ubuntu-latest
    needs: [typescript, go, python, rails, schemas, repository-quality]
    steps:
      - uses: actions/checkout@v4
      - run: >-
          docker compose --profile slice build
          control-plane document-fetcher stream-normalizer realtime-gateway
          nlp-worker entity-resolution claim-intelligence search-projector
          alert-projector notification-worker graph-query graph-analytics-api graph-analytics-worker
          velato-api velato-worker web kafka-connect

  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [docker-build, security]
    steps:
      - uses: actions/checkout@v4
      - name: Start and verify SignalChord v1
        run: |
          set +e
          ./scripts/dev-up.sh
          status=$?
          if [ "$status" -eq 0 ]; then ./scripts/smoke-test.sh; status=$?; fi
          docker compose --profile slice ps > compose-ps.txt
          docker compose --profile slice logs --no-color > compose.log
          exit "$status"
      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-diagnostics
          path: |
            compose-ps.txt
            compose.log
          if-no-files-found: warn
      - if: always()
        run: docker compose --profile slice down --volumes --remove-orphans
