name: Workflow Security

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/validate_workflow_actions.py'
      - 'scripts/test_validate_workflow_actions.py'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/validate_workflow_actions.py'
      - 'scripts/test_validate_workflow_actions.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate immutable Action references and permissions
        run: python3 scripts/validate_workflow_actions.py
      - name: Test workflow policy validator
        run: python3 scripts/test_validate_workflow_actions.py
