name: Repository History Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-history-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Gitleaks
        shell: bash
        run: |
          set -o pipefail
          curl --fail --silent --show-error --location \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan complete Git history for secrets
        run: >-
          gitleaks git --redact --exit-code=1
          --report-format=json --report-path=history-audit-gitleaks.json .
      - name: Scan complete Git history for proprietary and private content
        run: >-
          python3 scripts/audit_repository_history.py
          --report history-audit-proprietary.json
      - name: Test history audit
        run: python3 scripts/test_audit_repository_history.py
      - name: Upload redacted audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repository-history-audit
          path: |
            history-audit-gitleaks.json
            history-audit-proprietary.json
          if-no-files-found: warn
