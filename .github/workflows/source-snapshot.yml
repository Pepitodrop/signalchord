name: Source Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package repository source
        run: tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=.expo -czf signalchord-source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: signalchord-source
          path: signalchord-source.tgz
          if-no-files-found: error
          retention-days: 7
