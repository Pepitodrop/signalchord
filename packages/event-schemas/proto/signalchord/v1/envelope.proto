syntax = "proto3";
package signalchord.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

message EventEnvelope {
  string event_id = 1;
  string event_type = 2;
  uint32 schema_version = 3;
  string tenant_id = 4;
  google.protobuf.Timestamp occurred_at = 5;
  google.protobuf.Timestamp ingested_at = 6;
  string correlation_id = 7;
  string causation_id = 8;
  string origin = 9;
  string processing_stage = 10;
  string idempotency_key = 11;
  string traceparent = 12;
  google.protobuf.Timestamp source_event_time = 13;
  int64 lateness_ms = 14;
  map<string,string> attributes = 15;
  google.protobuf.Any payload = 16;
}
