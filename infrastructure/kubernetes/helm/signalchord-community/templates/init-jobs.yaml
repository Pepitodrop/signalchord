apiVersion: batch/v1
kind: Job
metadata:
  name: signalchord-init-kafka
  labels:
    app.kubernetes.io/name: init-kafka
    app.kubernetes.io/part-of: signalchord
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "10"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: init-kafka
        app.kubernetes.io/part-of: signalchord
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: topics
          image: {{ .Values.images.kafka | quote }}
          command: [sh, -ec]
          args:
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do sleep 5; done
              topics="source.registered.v1 source.poll.requested.v1 source.document.discovered.v1 source.document.fetched.v1 source.takedown.requested.v1 document.normalized.v1 document.duplicate-detected.v1 document.nlp-requested.v1 document.nlp-completed.v1 entity.mention-extracted.v1 entity.resolution-requested.v1 entity.resolved.v1 claim.extracted.v1 claim.clustered.v1 claim.contradiction-detected.v1 relationship.extracted.v1 graph.mutation-requested.v1 graph.mutation-completed.v1 graph.analytics-requested.v1 intelligence.signal-created.v1 alert.policy-evaluation-requested.v1 alert.created.v1 notification.requested.v1 tenant.export.requested.v1 tenant.deletion.requested.v1 audit.event.v1"
              for topic in $topics; do
                cleanup=delete
                retention=2592000000
                if [ "$topic" = source.registered.v1 ]; then cleanup=compact; retention=-1; fi
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$topic" --partitions 6 --replication-factor 1 --config cleanup.policy="$cleanup" --config retention.ms="$retention"
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$topic.dlq" --partitions 3 --replication-factor 1 --config cleanup.policy=delete --config retention.ms=2592000000
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: signalchord-init-minio
  labels:
    app.kubernetes.io/name: init-minio
    app.kubernetes.io/part-of: signalchord
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "10"
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: init-minio
        app.kubernetes.io/part-of: signalchord
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: bucket
          image: {{ .Values.images.minioClient | quote }}
          command: [sh, -ec]
          args:
            - |
              until mc alias set signalchord http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null 2>&1; do sleep 5; done
              mc mb --ignore-existing signalchord/raw-documents
              mc anonymous set none signalchord/raw-documents
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: MINIO_ACCESS_KEY}}
            - name: MINIO_SECRET_KEY
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: MINIO_SECRET_KEY}}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
