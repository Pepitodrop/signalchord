name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  COMPOSE_FILE: docker-compose.yml:docker-compose.override.yml:docker-compose.projector.yml

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.16.0
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typescript-typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: typescript-diagnostics
          path: typescript-typecheck.log
          if-no-files-found: warn
      - run: pnpm test
      - run: pnpm build

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: services/go.mod
      - run: go mod tidy
      - name: Verify Go dependency metadata is committed
        run: git diff --exit-code -- go.mod go.sum
      - run: test -z "$(gofmt -l .)"
      - name: Go vet
        shell: bash
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee go-vet.log
      - name: Upload Go diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-diagnostics
          path: services/go-vet.log
          if-no-files-found: warn
      - run: go test -race ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/requirements.txt
      - run: pip install -r services/requirements.txt pytest==8.4.0 ruff==0.11.13 mypy==1.16.0
      - run: python -m compileall -q services
      - run: >-
          pytest -q
          services/nlp-pipeline services/entity-resolution services/claim-intelligence
          services/velato-engine services/notification-worker services/graph-projector
          services/python_common services/search-projector services/graph-query
      - run: ruff check --select E9,F63,F7,F82 services

  rails:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: signalchord_control_plane_test
          POSTGRES_USER: signalchord
          POSTGRES_PASSWORD: signalchord
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U signalchord -d signalchord_control_plane_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
    defaults:
      run:
        working-directory: apps/control-plane
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://signalchord:signalchord@localhost:5432/signalchord_control_plane_test
      SECRET_KEY_BASE: ci-secret-key-base
      NOTIFICATION_TOKEN_ENCRYPTION_KEY: ci-notification-encryption-key
      DISABLE_BOOTSNAP: 'true'
      SIGNALCHORD_VERSION: 1.0.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: '3.4.4'
      - run: bundle config set frozen true
      - run: bundle install --jobs 4 --retry 3
      - run: git diff --exit-code -- Gemfile.lock
      - run: bin/rails db:prepare
      - run: bundle exec rspec
      - run: bin/rails zeitwerk:check

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: '1.55.1'
      - working-directory: packages/event-schemas
        run: buf lint
      - name: Backward compatibility when baseline exists
        shell: bash
        run: |
          if git cat-file -e origin/main:packages/event-schemas/buf.yaml 2>/dev/null; then
            cd packages/event-schemas
            buf breaking --against '../../.git#branch=origin/main,subdir=packages/event-schemas'
          else
            echo 'No event-schema baseline exists on main yet.'
          fi

  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck
      - run: python3 scripts/validate_workflow_actions.py
      - run: python3 scripts/test_validate_workflow_actions.py
      - run: python3 scripts/test_validate_helm_policy.py
      - run: python3 scripts/test_release_manifest.py
      - run: python3 scripts/validate_observability.py
      - run: python3 scripts/validate_capacity.py
      - run: python3 scripts/test_validate_capacity.py
      - run: python3 scripts/validate_recovery.py
      - run: python3 scripts/test_validate_recovery.py
      - run: python3 scripts/validate_governance.py
      - run: python3 scripts/test_validate_governance.py
      - run: python3 scripts/validate_quality.py
      - run: python3 scripts/test_validate_quality.py
      - run: python3 scripts/validate_product_readiness.py
      - run: python3 scripts/test_validate_product_readiness.py
      - name: Verify release Dockerfile bases are digest-pinned
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          failures = []
          for path in Path("infrastructure/docker").rglob("Dockerfile"):
              for line_number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  if line.startswith("FROM ") and "@sha256:" not in line:
                      failures.append(f"{path}:{line_number}: {line}")
          if failures:
              print("Release Dockerfile base images must be pinned by digest.", file=sys.stderr)
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          PY
      - run: docker compose --profile slice config --quiet
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Validate Helm chart
        run: |
          helm lint infrastructure/kubernetes/helm/signalchord
          helm template signalchord infrastructure/kubernetes/helm/signalchord \
            --set global.imageTag=sha-ci \
            --set global.existingSecret=signalchord-runtime >/tmp/signalchord-manifests.yaml
          test -s /tmp/signalchord-manifests.yaml
          helm template signalchord infrastructure/kubernetes/helm/signalchord \
            --values infrastructure/kubernetes/helm/signalchord/values-staging.yaml \
            --set global.imageTag=sha-1234567 \
            --set global.existingSecret=signalchord-runtime >/tmp/signalchord-staging.yaml
          python3 scripts/validate_helm_policy.py /tmp/signalchord-staging.yaml --environment staging
          helm template signalchord infrastructure/kubernetes/helm/signalchord \
            --values infrastructure/kubernetes/helm/signalchord/values-production.yaml \
            --values scripts/fixtures/helm-production-digests.yaml \
            --set global.existingSecret=signalchord-runtime >/tmp/signalchord-production.yaml
          python3 scripts/validate_helm_policy.py /tmp/signalchord-production.yaml --environment production
      - name: Validate JSON documents
        run: find . -type f -name '*.json' -not -path './node_modules/*' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null

  helm-disposable-cluster:
    runs-on: ubuntu-latest
    needs: [repository-quality]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: signalchord-chart
      - name: Dry-run production chart in disposable cluster
        run: |
          kubectl create namespace signalchord
          helm template signalchord infrastructure/kubernetes/helm/signalchord \
            --namespace signalchord \
            --values infrastructure/kubernetes/helm/signalchord/values-production.yaml \
            --values scripts/fixtures/helm-production-digests.yaml \
            --set global.existingSecret=signalchord-runtime \
            --set externalSecret.enabled=false >/tmp/signalchord-production.yaml
          kubectl apply --namespace signalchord --dry-run=client --validate=false -f /tmp/signalchord-production.yaml
          kubectl get namespace signalchord

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - run: gitleaks git --redact --exit-code=1 .
      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload Trivy diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-fs-diagnostics
          path: trivy-fs.txt
          if-no-files-found: warn

  docker-build:
    runs-on: ubuntu-latest
    needs: [typescript, go, python, rails, schemas, repository-quality, helm-disposable-cluster]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build service images
        shell: bash
        run: |
          set -o pipefail
          docker compose --profile slice build \
            control-plane document-fetcher stream-normalizer realtime-gateway \
            nlp-worker entity-resolution claim-intelligence search-projector \
            alert-projector notification-worker graph-projector graph-query graph-analytics-api graph-analytics-worker \
            velato-api velato-worker web 2>&1 | tee docker-build.log
      - name: Upload Docker build diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-build-diagnostics
          path: docker-build.log
          if-no-files-found: warn

  end-to-end:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [docker-build, security]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Start and verify SignalChord v1
        run: |
          set +e
          ./scripts/dev-up.sh
          status=$?
          if [ "$status" -eq 0 ]; then ./scripts/smoke-test.sh; status=$?; fi
          docker compose --profile slice ps > compose-ps.txt
          docker compose --profile slice logs --no-color > compose.log
          exit "$status"
      - name: Upload Compose diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compose-diagnostics
          path: |
            compose-ps.txt
            compose.log
          if-no-files-found: warn
      - if: always()
        run: docker compose --profile slice down --volumes --remove-orphans
