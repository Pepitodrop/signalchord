{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signalchord
  labels:
    app.kubernetes.io/part-of: signalchord
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: {name: signalchord-control-plane, port: {number: 3000}}
          - path: /events
            pathType: Prefix
            backend:
              service: {name: signalchord-realtime, port: {number: 8088}}
          - path: /
            pathType: Prefix
            backend:
              service: {name: signalchord-web, port: {number: 80}}
{{- end }}
