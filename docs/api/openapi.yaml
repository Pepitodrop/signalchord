openapi: 3.1.0
info:
  title: SignalChord Public API
  version: 1.0.0
  description: Versioned, tenant-scoped control-plane and intelligence API. Graph queries use approved templates; unrestricted Cypher is never accepted.
servers:
  - url: https://api.signalchord.example/api/v1
security:
  - bearerAuth: []
paths:
  /auth/session:
    post:
      tags: [Authentication]
      security: []
      summary: Exchange credentials or an external identity assertion for a session
      responses:
        '201': {description: Session established}
    delete:
      tags: [Authentication]
      summary: Revoke the current session token
      responses:
        '204': {description: Revoked}
  /organizations:
    get:
      summary: List organizations visible to the authenticated user
      responses:
        '200': {description: Organization list}
  /sources:
    get:
      summary: List governed sources for the active tenant
      responses:
        '200': {description: Source list}
    post:
      summary: Register a governed source
      responses:
        '201': {description: Source registered}
  /watchlists:
    get:
      summary: List tenant watchlists
      responses:
        '200': {description: Watchlist list}
    post:
      summary: Create a watchlist
      responses:
        '201': {description: Watchlist created}
  /alerts:
    get:
      summary: List alerts
      parameters:
        - {name: unread, in: query, schema: {type: boolean}}
      responses:
        '200': {description: Alert list}
  /policies:
    get:
      summary: List alert policies
      responses:
        '200': {description: Policy list}
    post:
      summary: Create an alert policy
      responses:
        '201': {description: Policy created}
  /policies/{id}/upload_velato:
    post:
      summary: Upload and validate a Velato MIDI policy
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        '202': {description: Policy version validated}
  /investigations:
    get:
      summary: List saved investigations
      responses:
        '200': {description: Investigation list}
    post:
      summary: Create an investigation
      responses:
        '201': {description: Investigation created}
  /search:
    get:
      summary: Search tenant-scoped projections
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Search results}
  /entities/{stable_id}:
    get:
      summary: Fetch one tenant-scoped entity projection
      parameters:
        - {name: stable_id, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Entity projection}
  /entities/{stable_id}/timeline:
    get:
      summary: Execute the approved timeline graph query
      parameters:
        - {name: stable_id, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Timeline results}
  /entities/{stable_id}/graph:
    get:
      summary: Execute the approved neighborhood graph query
      parameters:
        - {name: stable_id, in: path, required: true, schema: {type: string}}
      responses:
        '200': {description: Graph results}
  /governance_requests:
    get:
      summary: List tenant export, deletion, and source-takedown requests
      responses:
        '200': {description: Governance request list}
    post:
      summary: Submit an idempotent governance request
      parameters:
        - {name: Idempotency-Key, in: header, required: true, schema: {type: string}}
      responses:
        '202': {description: Governance request accepted}
  /notification_endpoints:
    get:
      summary: List the authenticated user's notification endpoints
      responses:
        '200': {description: Endpoint list}
    post:
      summary: Register an encrypted notification endpoint
      responses:
        '201': {description: Endpoint registered}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
