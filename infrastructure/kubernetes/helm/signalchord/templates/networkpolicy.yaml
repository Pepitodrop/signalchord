{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signalchord-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: signalchord
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signalchord-internal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: signalchord
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: signalchord
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: signalchord
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signalchord-dns-and-dependencies
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: signalchord
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dnsPodLabels | nindent 14 }}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .name }}
      ports:
        {{- range .ports }}
        - {protocol: TCP, port: {{ . }}}
        {{- end }}
    {{- end }}
{{- if .Values.networkPolicy.publicInternetEgress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signalchord-ingestion-public-egress
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: {{ toJson .Values.networkPolicy.publicInternetEgress.workloads }}
  policyTypes: [Egress]
  egress:
    - to:
        {{- range .Values.networkPolicy.publicInternetEgress.cidrs }}
        - ipBlock: {cidr: {{ . | quote }}}
        {{- end }}
      ports:
        {{- range .Values.networkPolicy.publicInternetEgress.ports }}
        - {protocol: TCP, port: {{ . }}}
        {{- end }}
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signalchord-ingress-controller
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [web, control-plane, realtime]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
{{- end }}
{{- end }}
