server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' http://localhost:8088; img-src 'self' data:;" always;
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
  location / { try_files $uri /index.html; }
}
