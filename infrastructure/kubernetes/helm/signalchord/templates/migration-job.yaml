{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: signalchord-migrate-{{ .Release.Revision }}
  labels:
    app.kubernetes.io/name: migration
    app.kubernetes.io/part-of: signalchord
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migration
        app.kubernetes.io/part-of: signalchord
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: migrate
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.migrationJob.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: {{ toJson .Values.migrationJob.command }}
          env:
            - {name: RAILS_ENV, value: production}
            - {name: SIGNALCHORD_ENV, value: {{ .Values.global.environment | quote }}}
            - {name: DISABLE_BOOTSNAP, value: "true"}
            - {name: TMPDIR, value: /tmp}
          envFrom:
            - secretRef: {name: {{ .Values.global.existingSecret }}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
