name: Source Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Package repository source
        run: tar --exclude=.git --exclude=node_modules --exclude=dist --exclude=.expo -czf /tmp/signalchord-source.tgz .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signalchord-source
          path: /tmp/signalchord-source.tgz
          if-no-files-found: error
          retention-days: 7
