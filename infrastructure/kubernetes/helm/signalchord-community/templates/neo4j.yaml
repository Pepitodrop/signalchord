apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels: {app.kubernetes.io/name: neo4j, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: neo4j, app.kubernetes.io/part-of: signalchord}
  ports:
    - {name: http, port: 7474, targetPort: http}
    - {name: bolt, port: 7687, targetPort: bolt}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  labels: {app.kubernetes.io/name: neo4j, app.kubernetes.io/part-of: signalchord}
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: neo4j, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: neo4j, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: neo4j
          image: {{ .Values.images.neo4j | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: NEO4J_AUTH
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: NEO4J_AUTH}}
            - {name: NEO4J_server_memory_heap_initial__size, value: 512m}
            - {name: NEO4J_server_memory_heap_max__size, value: 1G}
            - {name: NEO4J_server_memory_pagecache_size, value: 512m}
          ports:
            - {name: http, containerPort: 7474}
            - {name: bolt, containerPort: 7687}
          readinessProbe: {tcpSocket: {port: bolt}, initialDelaySeconds: 20, periodSeconds: 10, failureThreshold: 18}
          livenessProbe: {tcpSocket: {port: bolt}, initialDelaySeconds: 60, periodSeconds: 20}
          resources:
            {{- toYaml .Values.resources.neo4j | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: data, mountPath: /data}]
      terminationGracePeriodSeconds: 90
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources: {requests: {storage: {{ .Values.persistence.neo4j | quote }}}}
