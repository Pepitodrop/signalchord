services:
  graph-projector:
    profiles: [slice]
    build: {context: ., dockerfile: infrastructure/docker/python-service.Dockerfile}
    working_dir: /workspace/services/graph-projector
    command: ["python", "worker.py"]
    environment:
      KAFKA_BROKERS: kafka:9092
      SIGNALCHORD_ENV: development
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      kafka: {condition: service_healthy}
      neo4j: {condition: service_healthy}
    restart: unless-stopped
