name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm test
      - name: Build TypeScript applications
        shell: bash
        run: |
          set +e
          pnpm build > ts-build.log 2>&1
          status=$?
          tail -n 120 ts-build.log
          exit "$status"
      - name: Upload TypeScript build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ts-build-log
          path: ts-build.log
          if-no-files-found: error

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.10'
          cache-dependency-path: services/go.mod
      - run: go mod tidy
      - name: Format Go sources for validation
        run: gofmt -w .
      - run: go vet ./...
      - run: go test -race ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/requirements.txt
      - run: pip install -r services/requirements.txt pytest==8.4.0 ruff==0.11.13 mypy==1.16.0
      - run: python -m compileall -q services
      - run: pytest -q services/nlp-pipeline services/velato-engine
      - run: ruff check --select E9,F63,F7,F82 services

  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
      - run: find apps/control-plane -name '*.rb' -print0 | xargs -0 -n1 ruby -c

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.55.1'
      - working-directory: packages/event-schemas
        run: buf lint
      - name: Backward compatibility when baseline exists
        shell: bash
        run: |
          if git cat-file -e origin/main:packages/event-schemas/buf.yaml 2>/dev/null; then
            cd packages/event-schemas
            buf breaking --against '../../.git#branch=origin/main,subdir=packages/event-schemas'
          else
            echo 'No event-schema baseline exists on main yet.'
          fi

  repository-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck
      - run: docker compose config --quiet
      - name: Validate JSON documents
        run: find . -type f -name '*.json' -not -path './node_modules/*' -print0 | xargs -0 -n1 python3 -m json.tool >/dev/null

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan repository history with Gitleaks
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --redact --report-format=json \
            --report-path=/repo/gitleaks-report.json --exit-code=1 /repo
          status=$?
          if [ -f gitleaks-report.json ]; then
            python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('gitleaks-report.json')
          findings = json.loads(path.read_text()) if path.stat().st_size else []
          print(f'Gitleaks findings: {len(findings)}')
          for finding in findings:
              print(f"- {finding.get('RuleID')} {finding.get('File')}:{finding.get('StartLine')}")
          PY
          fi
          exit "$status"
      - name: Upload redacted Gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: error
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload Trivy report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    needs: [go, python, typescript, repository-quality]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --profile slice build document-fetcher stream-normalizer nlp-worker velato-worker realtime-gateway web kafka-connect
