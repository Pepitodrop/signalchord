{{- if .Values.serviceAccount.create }}
{{- range $name, $workload := .Values.workloads }}
{{- if $workload.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "signalchord.workloadServiceAccountName" (dict "root" $ "name" $name) }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: signalchord
  {{- with (index $.Values.serviceAccount.workloadAnnotations $name) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- if .Values.feedCollector.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "signalchord.workloadServiceAccountName" (dict "root" . "name" "feed-collector") }}
  labels:
    app.kubernetes.io/name: feed-collector
    app.kubernetes.io/part-of: signalchord
  {{- with (index .Values.serviceAccount.workloadAnnotations "feed-collector") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- if .Values.migrationJob.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "signalchord.workloadServiceAccountName" (dict "root" . "name" "migration") }}
  labels:
    app.kubernetes.io/name: migration
    app.kubernetes.io/part-of: signalchord
  {{- with (index .Values.serviceAccount.workloadAnnotations "migration") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
