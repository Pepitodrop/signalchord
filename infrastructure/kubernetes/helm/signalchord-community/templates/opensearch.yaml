apiVersion: v1
kind: Service
metadata:
  name: opensearch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: signalchord
spec:
  selector:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: signalchord
  ports:
    - {name: http, port: 9200, targetPort: http}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: signalchord
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
      app.kubernetes.io/part-of: signalchord
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: signalchord
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: opensearch
          image: {{ .Values.images.opensearch | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - {name: discovery.type, value: single-node}
            - {name: DISABLE_INSTALL_DEMO_CONFIG, value: "true"}
            - {name: DISABLE_SECURITY_PLUGIN, value: "true"}
            - {name: OPENSEARCH_JAVA_OPTS, value: -Xms768m -Xmx768m}
          ports:
            - {name: http, containerPort: 9200}
          readinessProbe:
            httpGet: {path: /_cluster/health, port: http}
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.opensearch | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: data, mountPath: /usr/share/opensearch/data}
      terminationGracePeriodSeconds: 90
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources:
          requests: {storage: {{ .Values.persistence.opensearch | quote }}}
