name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semantic-version tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pepitodrop/signalchord

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.16.0
      - id: meta
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then tag="${REQUESTED_TAG}"; fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          git fetch origin main --tags
          git rev-parse --verify "refs/tags/$tag"
          tagged_sha=$(git rev-list -n 1 "$tag")
          git merge-base --is-ancestor "$tagged_sha" origin/main
          git checkout --detach "$tagged_sha"
          test -f pnpm-lock.yaml
          test -f apps/control-plane/Gemfile.lock
          test -f services/go.sum
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$tagged_sha" >> "$GITHUB_OUTPUT"
      - name: Verify frozen dependency metadata
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm install --frozen-lockfile
          git diff --exit-code -- pnpm-lock.yaml apps/control-plane/Gemfile.lock services/go.sum
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Generate source SBOM
        run: syft dir:. -o spdx-json=sbom-source.spdx.json
      - name: Scan release source dependencies and filesystem
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-source.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload source supply-chain evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-supply-chain
          path: |
            sbom-source.spdx.json
            trivy-source.txt
          if-no-files-found: error

  publish-images:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: control-plane
            dockerfile: infrastructure/docker/control-plane.Dockerfile
            build_args: ''
          - name: python
            dockerfile: infrastructure/docker/python-service.Dockerfile
            build_args: ''
          - name: web
            dockerfile: infrastructure/docker/web.Dockerfile
            build_args: ''
          - name: feed-collector
            dockerfile: infrastructure/docker/go-service.Dockerfile
            build_args: TARGET=./feed-collector
          - name: document-fetcher
            dockerfile: infrastructure/docker/go-service.Dockerfile
            build_args: TARGET=./document-fetcher/cmd
          - name: stream-normalizer
            dockerfile: infrastructure/docker/go-service.Dockerfile
            build_args: TARGET=./stream-normalizer/cmd
          - name: realtime-gateway
            dockerfile: infrastructure/docker/go-service.Dockerfile
            build_args: TARGET=./realtime-gateway
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.verify.outputs.sha }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ needs.verify.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:sha-${{ needs.verify.outputs.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
      - name: Generate final-image SBOM
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: syft "$IMAGE@$DIGEST" -o spdx-json="sbom-image-${{ matrix.name }}.spdx.json"
      - name: Scan final image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: table
          output: trivy-image-${{ matrix.name }}.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Sign immutable image digest
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Verify image signature
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CERT_IDENTITY_RE: https://github.com/Pepitodrop/signalchord/.github/workflows/release.yml@refs/(tags/v[0-9]+\.[0-9]+\.[0-9]+|heads/main)
        run: >-
          cosign verify
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-identity-regexp "$CERT_IDENTITY_RE"
          "$IMAGE@$DIGEST" > "cosign-verify-${{ matrix.name }}.txt"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Verify provenance attestation
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          CERT_IDENTITY_RE: https://github.com/Pepitodrop/signalchord/.github/workflows/release.yml@refs/(tags/v[0-9]+\.[0-9]+\.[0-9]+|heads/main)
        run: >-
          cosign verify-attestation
          --type slsaprovenance
          --certificate-oidc-issuer https://token.actions.githubusercontent.com
          --certificate-identity-regexp "$CERT_IDENTITY_RE"
          "$IMAGE@$DIGEST" > "cosign-attestation-${{ matrix.name }}.txt"
      - name: Record immutable digest
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: printf '%s@%s\n' "$IMAGE" "$DIGEST" > "digest-${{ matrix.name }}.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.name }}
          path: digest-${{ matrix.name }}.txt
          if-no-files-found: error
      - name: Upload image supply-chain evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-${{ matrix.name }}
          path: |
            sbom-image-${{ matrix.name }}.spdx.json
            trivy-image-${{ matrix.name }}.txt
            cosign-verify-${{ matrix.name }}.txt
            cosign-attestation-${{ matrix.name }}.txt
          if-no-files-found: warn

  release:
    needs: [verify, publish-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.verify.outputs.sha }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: release-digests
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: '*supply-chain*'
          merge-multiple: true
          path: release-supply-chain
      - name: Build release manifest
        shell: bash
        run: |
          set -euo pipefail
          cat release-digests/digest-*.txt | sort > image-digests.txt
          git archive --format=tar.gz --prefix="signalchord-${{ needs.verify.outputs.tag }}/" -o "signalchord-${{ needs.verify.outputs.tag }}.tar.gz" HEAD
          python3 scripts/release_manifest.py build \
            --tag "${{ needs.verify.outputs.tag }}" \
            --commit "${{ needs.verify.outputs.sha }}" \
            --digests-dir release-digests \
            --sbom-dir release-supply-chain \
            --scan-dir release-supply-chain \
            --source-archive "signalchord-${{ needs.verify.outputs.tag }}.tar.gz" \
            --output release-manifest.json
          python3 scripts/release_manifest.py validate --file release-manifest.json
          sha256sum image-digests.txt release-manifest.json release-supply-chain/* "signalchord-${{ needs.verify.outputs.tag }}.tar.gz" > SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            image-digests.txt
            release-manifest.json
            release-supply-chain/*
            SHA256SUMS
            signalchord-${{ needs.verify.outputs.tag }}.tar.gz
