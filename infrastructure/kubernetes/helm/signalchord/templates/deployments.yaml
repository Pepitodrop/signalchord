{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalchord-{{ $name }}
  labels: {app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/part-of: signalchord}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels: {app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/part-of: signalchord}
    spec:
      serviceAccountName: {{ include "signalchord.serviceAccountName" $ }}
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $service.image }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- with $service.command }}
          {{- if gt (len .) 0 }}
          command: {{ toJson . }}
          {{- end }}
          {{- end }}
          {{- with $service.workingDir }}
          workingDir: {{ . }}
          {{- end }}
          env:
            - {name: SIGNALCHORD_ENV, value: {{ $.Values.global.environment | quote }}}
            - {name: KAFKA_BROKERS, value: {{ $.Values.global.config.kafkaBrokers | quote }}}
            - {name: SCHEMA_REGISTRY_URL, value: {{ $.Values.global.config.schemaRegistryUrl | quote }}}
            - {name: MINIO_ENDPOINT, value: {{ $.Values.global.config.minioEndpoint | quote }}}
            - {name: MINIO_BUCKET, value: {{ $.Values.global.config.minioBucket | quote }}}
            - {name: REDIS_URL, value: {{ $.Values.global.config.redisUrl | quote }}}
            - {name: WEB_ORIGIN, value: {{ $.Values.global.config.webOrigin | quote }}}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ $.Values.global.otelEndpoint | quote }}}
          envFrom:
            - secretRef: {name: {{ $.Values.global.existingSecret }}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          resources: {{ toYaml $.Values.resources | nindent 12 }}
          {{- if $service.port }}
          ports: [{name: http, containerPort: {{ $service.port }}}]
          readinessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 15, periodSeconds: 20}
          {{- end }}
{{- end }}
{{- end }}
