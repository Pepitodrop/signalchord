apiVersion: v1
kind: Service
metadata:
  name: minio
  labels: {app.kubernetes.io/name: minio, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: minio, app.kubernetes.io/part-of: signalchord}
  ports:
    - {name: api, port: 9000, targetPort: api}
    - {name: console, port: 9001, targetPort: console}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels: {app.kubernetes.io/name: minio, app.kubernetes.io/part-of: signalchord}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: minio, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: minio, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: minio
          image: {{ .Values.images.minio | quote }}
          imagePullPolicy: IfNotPresent
          args: [server, /data, --console-address, :9001]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: MINIO_ACCESS_KEY}}
            - name: MINIO_ROOT_PASSWORD
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: MINIO_SECRET_KEY}}
          ports:
            - {name: api, containerPort: 9000}
            - {name: console, containerPort: 9001}
          readinessProbe: {httpGet: {path: /minio/health/ready, port: api}, initialDelaySeconds: 10, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /minio/health/live, port: api}, initialDelaySeconds: 30, periodSeconds: 20}
          resources:
            {{- toYaml .Values.resources.minio | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: data, mountPath: /data}]
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources: {requests: {storage: {{ .Values.persistence.minio | quote }}}}
