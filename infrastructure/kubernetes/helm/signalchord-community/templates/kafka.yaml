apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  labels: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
spec:
  clusterIP: None
  selector: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
  ports:
    - {name: broker, port: 9092, targetPort: broker}
    - {name: controller, port: 9093, targetPort: controller}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
  ports: [{name: broker, port: 9092, targetPort: broker}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: kafka, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: kafka
          image: {{ .Values.images.kafka | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - {name: broker, containerPort: 9092}
            - {name: controller, containerPort: 9093}
          env:
            - {name: KAFKA_NODE_ID, value: "1"}
            - {name: KAFKA_PROCESS_ROLES, value: "broker,controller"}
            - {name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"}
            - {name: KAFKA_LISTENERS, value: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"}
            - {name: KAFKA_ADVERTISED_LISTENERS, value: "INTERNAL://kafka:9092"}
            - {name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "INTERNAL"}
            - {name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER"}
            - {name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka-0.kafka-headless:9093"}
            - {name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1"}
            - {name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR, value: "1"}
            - {name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "false"}
            - {name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0"}
            - {name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data"}
            - {name: CLUSTER_ID, value: "MkU3OEVBNTcwNTJENDM2Qk"}
          readinessProbe:
            exec: {command: [sh, -c, '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null']}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe: {tcpSocket: {port: broker}, initialDelaySeconds: 60, periodSeconds: 20}
          resources:
            {{- toYaml .Values.resources.kafka | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: data, mountPath: /var/lib/kafka/data}]
      terminationGracePeriodSeconds: 90
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources: {requests: {storage: {{ .Values.persistence.kafka | quote }}}}
