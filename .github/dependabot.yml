version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: {interval: weekly}
    groups:
      javascript:
        patterns: ['*']
  - package-ecosystem: gomod
    directory: /services
    schedule: {interval: weekly}
  - package-ecosystem: pip
    directory: /services
    schedule: {interval: weekly}
  - package-ecosystem: bundler
    directory: /apps/control-plane
    schedule: {interval: weekly}
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
