name: History Audit

on:
  push:
    branches: [main]
    paths:
      - 'governance/history-audit-allowlist.json'
      - 'scripts/audit_repository_history.py'
      - 'scripts/test_audit_repository_history.py'
      - '.github/workflows/history-audit.yml'
  pull_request:
    paths:
      - 'governance/history-audit-allowlist.json'
      - 'scripts/audit_repository_history.py'
      - 'scripts/test_audit_repository_history.py'
      - '.github/workflows/history-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: history-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Install Gitleaks
        run: |
          curl --fail --silent --show-error --location \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan all refs for secrets
        run: gitleaks git --log-opts='--all' --redact --exit-code=1 .
      - name: Test history audit policy
        run: python3 scripts/test_audit_repository_history.py
      - name: Audit all reachable blobs
        run: python3 scripts/audit_repository_history.py --report history-audit-report.json
      - name: Upload history audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: history-audit-report
          path: history-audit-report.json
          if-no-files-found: warn
