{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalchord-otel-config
  labels: {app.kubernetes.io/part-of: signalchord}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {endpoint: 0.0.0.0:4317}
          http: {endpoint: 0.0.0.0:4318}
    processors:
      batch: {}
      memory_limiter: {check_interval: 1s, limit_mib: 384}
    exporters:
      prometheus: {endpoint: 0.0.0.0:8889}
      debug: {verbosity: basic}
    service:
      pipelines:
        traces: {receivers: [otlp], processors: [memory_limiter, batch], exporters: [debug]}
        metrics: {receivers: [otlp], processors: [memory_limiter, batch], exporters: [prometheus]}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalchord-prometheus-config
  labels: {app.kubernetes.io/part-of: signalchord}
data:
  prometheus.yml: |
    global: {scrape_interval: 15s}
    scrape_configs:
      - job_name: prometheus
        static_configs: [{targets: [localhost:9090]}]
      - job_name: signalchord-otel
        static_configs: [{targets: [otel-collector:8889]}]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: signalchord-grafana-datasources
  labels: {app.kubernetes.io/part-of: signalchord}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels: {app.kubernetes.io/name: otel-collector, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: otel-collector, app.kubernetes.io/part-of: signalchord}
  ports:
    - {name: grpc, port: 4317, targetPort: grpc}
    - {name: http, port: 4318, targetPort: http}
    - {name: metrics, port: 8889, targetPort: metrics}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels: {app.kubernetes.io/name: otel-collector, app.kubernetes.io/part-of: signalchord}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: otel-collector, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: otel-collector, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: collector
          image: {{ .Values.images.otelCollector | quote }}
          args: [--config=/etc/otel/config.yaml]
          ports:
            - {name: grpc, containerPort: 4317}
            - {name: http, containerPort: 4318}
            - {name: metrics, containerPort: 8889}
          readinessProbe: {tcpSocket: {port: grpc}, initialDelaySeconds: 5, periodSeconds: 10}
          resources:
            {{- toYaml .Values.resources.otelCollector | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts:
            - {name: config, mountPath: /etc/otel, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: config, configMap: {name: signalchord-otel-config}}
        - {name: tmp, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels: {app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: signalchord}
  ports: [{name: http, port: 9090, targetPort: http}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  labels: {app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: signalchord}
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: prometheus, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 65534, runAsGroup: 65534, fsGroup: 65534, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus | quote }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.monitoring.prometheusRetention }}
          ports: [{name: http, containerPort: 9090}]
          readinessProbe: {httpGet: {path: /-/ready, port: http}, initialDelaySeconds: 10, periodSeconds: 10}
          resources:
            {{- toYaml .Values.resources.prometheus | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus, readOnly: true}
            - {name: data, mountPath: /prometheus}
      volumes:
        - {name: config, configMap: {name: signalchord-prometheus-config}}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources: {requests: {storage: {{ .Values.persistence.prometheus | quote }}}}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels: {app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: signalchord}
spec:
  selector: {app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: signalchord}
  ports: [{name: http, port: 3000, targetPort: http}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana
  labels: {app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: signalchord}
spec:
  serviceName: grafana
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: signalchord}
  template:
    metadata:
      labels: {app.kubernetes.io/name: grafana, app.kubernetes.io/part-of: signalchord}
    spec:
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, runAsUser: 472, runAsGroup: 472, fsGroup: 472, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: grafana
          image: {{ .Values.images.grafana | quote }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: GRAFANA_ADMIN_USER}}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: {{ .Values.existingSecret }}, key: GRAFANA_ADMIN_PASSWORD}}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "false"}
          ports: [{name: http, containerPort: 3000}]
          readinessProbe: {httpGet: {path: /api/health, port: http}, initialDelaySeconds: 15, periodSeconds: 10}
          resources:
            {{- toYaml .Values.resources.grafana | nindent 12 }}
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true}
      volumes:
        - {name: datasources, configMap: {name: signalchord-grafana-datasources}}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources: {requests: {storage: {{ .Values.persistence.grafana | quote }}}}
{{- end }}
